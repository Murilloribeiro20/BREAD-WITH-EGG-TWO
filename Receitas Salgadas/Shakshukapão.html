            <h2>Ingredientes</h2>

            <ul>
                <li>2 Ovos</li>
                <li>Molho de Tomate</li>    
                <li>Tomate</li> 
                <li>Cebola</li>
                <li>Alho</li>

            <ol>
                <li>Refogue Alho e Cebola.</li>

                <li>Tampe até Cozinhar.</li>
                <li>Sirva com Pão.</li>
            </ol>

            <ul>
                <li>Receita Cremosa e Muito saborosa</li>
