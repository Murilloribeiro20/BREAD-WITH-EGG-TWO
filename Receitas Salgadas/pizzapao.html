<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza de Pão</title> 
    <link rel="stylesheet" href="../cssSALGADO/pizzapao.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../imagens/egg.png">
</head>
<body>

<div class="topo">
        <div class="titulo">
            Pizza de Pão
        </div>

        <a href ="../Receitas Salgadas/receitassalgadas.html"><img src="../imagens/pãocomovo2.png" alt="Logo" class="logo"></a>
    </div>

    <div class="conteudo">

        <div class="texto">

            <h2>Ingredientes</h2>

            <ul>
                <li>Pão de forma</li>
                <li>Molho de tomate</li>
                <li>Queijo</li>
                <li>Ovo</li>
                <li>Tomate</li>
                <li>Orégano</li>
            </ul>

            <h2>Como fazer</h2>

            <ol>
                <li>Passe molho no pão.</li>
                <li>Adicione queijo e tomate.</li>
                <li>Coloque o ovo.</li>
                <li>Leve ao forno ou air fryer.</li>
            </ol>
            <h2>Tempo</h2>
            <ul>
                <li>Air fryer: 8 minutos</li>
                <li>Forno: 12 minutos</li>
            </ul>


        </div>

        <img src="../imagens/pizzapao.png" alt="Ovo no Pão" class="foto">

    </div>
</body>
</html>
