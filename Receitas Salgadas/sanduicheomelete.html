        <div class="texto">

            <h2>Ingredientes</h2>

            <ul>
                <li>2 ovos</li>
                <li>2 fatias de pão</li>
                <li>Queijo</li>
                <li>Tomate</li>
                <li>Sal</li>
                <li>Orégano</li>
            </ul>

            <h2>Como fazer</h2>

            <ol>
                <li>Bata os ovos.</li>
                <li>Faça uma omelete.</li>
                <li>Coloque queijo.</li>
                <li>Monte no pão.</li>
                <li>Sirva quente.</li>
            </ol>

            <h2>Dica</h2>

            <p>Pode adicionar presunto.</p>
