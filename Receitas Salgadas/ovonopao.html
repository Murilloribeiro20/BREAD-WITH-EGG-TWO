<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovo no Pão</title>
    <link rel="stylesheet" href="../css/ovonopao.css">
    <link rel="icon" type="image/png" sizes="32x32" href="C:\Users\Aluno\Downloads\egg.png">
</head>

<body>

    <div class="topo">
        <div class="titulo">
            Ovo no Pão
        </div>

        <img src="../imagens/pãocomovo2.png" alt="Logo" class="logo">
    </div>

    <div class="conteudo">

        <div class="texto">

            <h2>Ingredientes</h2>

            <ul>
                <li>1 fatia de pão</li>
                <li>1 ovo</li>
                <li>Manteiga</li>
                <li>Sal</li>
                <li>Pimenta</li>
            </ul>

            <h2>Como fazer</h2>

            <ol>
                <li>Faça um buraco no meio do pão.</li>
                <li>Coloque manteiga na frigideira.</li>
                <li>Adicione o pão.</li>
                <li>Quebre o ovo no centro.</li>
                <li>Tempere.</li>
                <li>Frite até dourar.</li>
            </ol>

            <h2>Dica</h2>

            <p>Sirva com queijo derretido.</p>

        </div>

        <img src="../imagens/eggwithbread.png" alt="Ovo no Pão" class="foto">

    </div>

</body>
